<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif" role="img" aria-label="LunoDB">
  <title>LunoDB</title>

  <defs>
    <!-- Brand cyan gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4de4ff"/>
      <stop offset="55%"  stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00a3cc"/>
    </linearGradient>

    <!-- Moving shimmer gradient for the wordmark -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="42%"  stop-color="#00d4ff"/>
      <stop offset="50%"  stop-color="#ffffff"/>
      <stop offset="58%"  stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00a3cc"/>
      <animateTransform attributeName="gradientTransform" type="translate"
                        values="-1.2 0; 1.2 0; 1.2 0"
                        keyTimes="0; 0.55; 1"
                        dur="5.5s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Cyan glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft halo around moon -->
    <radialGradient id="moonHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00d4ff" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#00d4ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient page-wide glow -->
    <radialGradient id="ambient" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Tagline typing clip -->
    <clipPath id="taglineClip">
      <rect x="0" y="0" width="0" height="40">
        <animate attributeName="width"
                 values="0;0;620;620;620"
                 keyTimes="0;0.15;0.55;0.92;1"
                 dur="5.5s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect x="0" y="0" width="1200" height="360" rx="20" fill="#0a0b0d"/>
  <rect x="0" y="0" width="1200" height="360" rx="20" fill="url(#ambient)"/>
  <rect x="0" y="0" width="1200" height="360" rx="20" fill="none" stroke="#1a1d22" stroke-width="1"/>

  <!-- ===== STARS ===== -->
  <g fill="#ffffff">
    <circle cx="80"   cy="60"  r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="160"  cy="120" r="1.0"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite" begin="0.3s"/></circle>
    <circle cx="220"  cy="50"  r="1.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.8s" repeatCount="indefinite" begin="1.1s"/></circle>
    <circle cx="320"  cy="90"  r="0.9"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.7s" repeatCount="indefinite" begin="0.6s"/></circle>
    <circle cx="100"  cy="220" r="1.1"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.3s" repeatCount="indefinite" begin="1.8s"/></circle>
    <circle cx="180"  cy="290" r="0.8"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.9s" repeatCount="indefinite" begin="0.9s"/></circle>
    <circle cx="280"  cy="250" r="1.3"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.6s" repeatCount="indefinite" begin="2.2s"/></circle>
    <circle cx="900"  cy="55"  r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" repeatCount="indefinite" begin="0.4s"/></circle>
    <circle cx="980"  cy="110" r="0.9"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.6s" repeatCount="indefinite" begin="1.5s"/></circle>
    <circle cx="1050" cy="70"  r="1.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="4.0s" repeatCount="indefinite" begin="2.0s"/></circle>
    <circle cx="1120" cy="160" r="1.0"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.0s" repeatCount="indefinite" begin="0.7s"/></circle>
    <circle cx="940"  cy="270" r="1.1"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.4s" repeatCount="indefinite" begin="1.3s"/></circle>
    <circle cx="1020" cy="310" r="0.8"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite" begin="2.6s"/></circle>
    <circle cx="1100" cy="240" r="1.3"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite" begin="1.7s"/></circle>
    <circle cx="500"  cy="40"  r="0.9"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.1s" repeatCount="indefinite" begin="2.3s"/></circle>
    <circle cx="720"  cy="320" r="1.1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" repeatCount="indefinite" begin="0.8s"/></circle>
    <circle cx="600"  cy="330" r="0.8"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.6s" repeatCount="indefinite" begin="1.9s"/></circle>
  </g>

  <!-- ===== LOGO ===== -->
  <g transform="translate(360, 180)">
    <!-- breathing cyan halo behind logo -->
    <circle cx="0" cy="0" r="140" fill="url(#moonHalo)">
      <animate attributeName="r"       values="130;156;130" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;1;0.55" dur="4.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Real LunoDB app icon (embedded as data URI so the SVG is self-contained) -->
    <image x="-88" y="-88" width="176" height="176"
           href="data:image/png;base64,"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <g transform="translate(470, 180)">
    <text x="0" y="22" font-size="110" font-weight="800" letter-spacing="-2" fill="url(#shimmer)">LunoDB</text>

    <!-- underline accent that sweeps in -->
    <rect x="0" y="50" width="0" height="3" rx="1.5" fill="url(#cyanGrad)">
      <animate attributeName="width"
               values="0;0;420;420;420"
               keyTimes="0;0.05;0.18;0.92;1"
               dur="5.5s" repeatCount="indefinite"/>
    </rect>

    <!-- tagline (types out) -->
    <g clip-path="url(#taglineClip)">
      <text x="0" y="92" font-size="20" font-weight="500" fill="#8b949e" letter-spacing="0.3">
        The professional database client developers love.
      </text>
    </g>
  </g>

</svg>
